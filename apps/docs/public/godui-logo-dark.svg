<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="GodUI">
  <title>GodUI</title>
  <defs>
    <linearGradient id="gd-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#303030" />
      <stop offset="1" stop-color="#1b1b1b" />
    </linearGradient>
    <linearGradient id="gd-track" x1="0.12" y1="0.05" x2="0.9" y2="1">
      <stop offset="0" stop-color="#a3a3a3" />
      <stop offset="1" stop-color="#7d7d7d" />
    </linearGradient>
    <filter id="gd-dot" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <style>
    .track { fill: none; stroke: url(#gd-track); stroke-width: 82; stroke-linecap: round; stroke-linejoin: round; }
    .dot   { fill: #fff; filter: url(#gd-dot); transform-box: view-box; offset-path: path("M361.5 153.6 A150 150 0 1 0 400 254 L272 254"); offset-distance: 0%; transition: offset-distance 1.1s cubic-bezier(.65,.05,.36,1); }
    .mark:hover .dot  { offset-distance: 100%; }
    @media (prefers-reduced-motion: reduce) { .dot { transition: none; } }
  </style>
  <g class="mark">
    <rect x="0" y="0" width="512" height="512" rx="92" fill="url(#gd-surface)" />
    <rect x="3" y="3" width="506" height="506" rx="89" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3" />
    <path class="track" d="M361.5 153.6 A150 150 0 1 0 400 254 L272 254" />
    <circle class="dot" r="29" />
  </g>
</svg>
